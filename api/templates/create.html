<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建比赛</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #95a5a6;
            color: white;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        .weights-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .weight-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .weight-row label {
            width: 80px;
            font-weight: normal;
        }
        .weight-row input {
            flex: 1;
            max-width: 100px;
        }
        .weight-row span {
            margin-left: 10px;
            color: #666;
        }
        .total-weight {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-weight: bold;
            color: #333;
        }
        .info-box {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>🎯 创建新比赛</h2>
        <form method="POST" id="competition-form">
            <div class="form-group">
                <label for="name">比赛名称:</label>
                <input type="text" id="name" name="name" placeholder="请输入比赛名称" value="未命名比赛" required>
            </div>
            <div class="form-group">
                <label for="date">比赛日期:</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="judge_password">评委密码:</label>
                <input type="password" id="judge_password" name="judge_password" placeholder="评委登录密码" value="123456" required>
            </div>
            <div class="form-group">
                <label for="num_groups">组数 (N):</label>
                <input type="number" id="num_groups" name="num_groups" min="1" max="10" value="3">
            </div>
            <div class="form-group">
                <label for="num_judges">每组评委数 (M):</label>
                <input type="number" id="num_judges" name="num_judges" min="1" max="10" value="3" onchange="updateWeights()">
            </div>
            <div class="form-group">
                <label for="num_players">每组选手数:</label>
                <input type="number" id="num_players" name="num_players" min="1" max="50" value="10">
            </div>
            
            <div class="info-box">
                💡 可以为每个评委设置不同的权重比例，最终得分 = Σ(评委打分 × 权重比例)
            </div>
            
            <div class="weights-section" id="weights-section">
                <h3 style="margin-top: 0; color: #333;">评委权重设置</h3>
                <div id="weights-container"></div>
                <div class="total-weight">
                    总权重: <span id="total-weight">100</span>%
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">创建并设置名称</button>
            <a href="/" class="btn btn-secondary">返回首页</a>
        </form>
    </div>
    
    <script>
        function updateWeights() {
            const numJudges = parseInt(document.getElementById('num_judges').value) || 1;
            const container = document.getElementById('weights-container');
            let html = '';
            
            for (let i = 1; i <= numJudges; i++) {
                const defaultWeight = (100 / numJudges).toFixed(2);
                html += `
                    <div class="weight-row">
                        <label>评委${i}:</label>
                        <input type="number" name="judge_weight_${i}" min="0" max="100" step="0.01" value="${defaultWeight}" oninput="updateTotal()">
                        <span>%</span>
                    </div>
                `;
            }
            container.innerHTML = html;
            updateTotal();
        }
        
        function updateTotal() {
            const numJudges = parseInt(document.getElementById('num_judges').value) || 1;
            let total = 0;
            
            for (let i = 1; i <= numJudges; i++) {
                const weight = parseFloat(document.querySelector(`input[name="judge_weight_${i}"]`)?.value) || 0;
                total += weight;
            }
            
            document.getElementById('total-weight').textContent = total.toFixed(2);
        }
        
        updateWeights();
        
        document.getElementById('competition-form').addEventListener('submit', function(e) {
            const total = parseFloat(document.getElementById('total-weight').textContent);
            if (Math.abs(total - 100) > 0.01) {
                e.preventDefault();
                alert(`评委权重总和必须等于100%，当前总和: ${total.toFixed(2)}%`);
            }
        });
    </script>
</body>
</html>
